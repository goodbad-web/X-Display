name: X-Display-Client
options:
  minimumXcodeGenVersion: 2.40.0
  xcodeVersion: "26.5"
  deploymentTarget:
    iOS: "17.0"
packages:
  XDisplayShared:
    path: ../XDisplayShared
targets:
  X-Display-Client:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    dependencies:
      - package: XDisplayShared
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: X-Display
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        LSRequiresIPhoneOS: true
        NSLocalNetworkUsageDescription: "X-Display uses your local network to discover and connect to the Mac host."
        NSBonjourServices:
          - _xdisplay._tcp
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goodbad-web.X-Display-Client
        DEVELOPMENT_TEAM: 76Q8Z9XK4F
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_NAME: "$(TARGET_NAME)"
        SWIFT_VERSION: "5.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
