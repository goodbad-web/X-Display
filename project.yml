name: X-Display
options:
  bundleIdPrefix: com.goodbad-web
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0
  XDisplayShared:
    path: ./XDisplayShared
targets:
  X-Display:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    entitlements:
      path: X-Display.entitlements
    sources:
      - path: Sources/X-display
      - path: Sources/CVirtualDisplay
      # Shared client files for macOS Receiver Window
      - path: iPad-client/Sources/AppViewModel.swift
      - path: iPad-client/Sources/StreamClient.swift
      - path: iPad-client/Sources/VideoDecoder.swift
      - path: iPad-client/Sources/DeviceBrowser.swift
      - path: iPad-client/Sources/MetalRendererView.swift
    dependencies:
      - package: Sparkle
      - package: XDisplayShared
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        DEVELOPMENT_TEAM: 76Q8Z9XK4F
        SWIFT_VERSION: "6.0"
        SWIFT_OBJC_BRIDGING_HEADER: Sources/CVirtualDisplay/include/CVirtualDisplay.h
        INFOPLIST_KEY_LSUIElement: YES
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.goodbad-web.X-Display
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_KEY_SUFeedURL: "https://goodbad-web.github.io/xdisplay/appcast.xml"
        INFOPLIST_KEY_SUPublicEDKey: "placeholder_ed25519_public_key_value_for_sparkle_signing"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_DEBUG_DYLIB: NO
        ENABLE_HARDENED_RUNTIME: NO

  X-Display-Client:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: iPad-client/Sources
    dependencies:
      - package: XDisplayShared
    info:
      path: iPad-client/Info.plist
      properties:
        CFBundleDisplayName: X-Display
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        LSRequiresIPhoneOS: true
        NSLocalNetworkUsageDescription: "X-Display uses your local network to discover and connect to the Mac host."
        NSBonjourServices:
          - _xdisplay._tcp
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goodbad-web.X-Display-Client
        DEVELOPMENT_TEAM: 76Q8Z9XK4F
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_NAME: "$(TARGET_NAME)"
        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        GENERATE_INFOPLIST_FILE: NO
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"

